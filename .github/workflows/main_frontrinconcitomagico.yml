name: Build and deploy React Vite - frontrinconcitomagico

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # CAMBIO 1: Entramos a la carpeta PROFUNDA donde está el package.json
      - name: npm install and build
        working-directory: ./frontend/sistema-biblioteca
        run: |
          npm install
          npm run build

      # CAMBIO 2: Buscamos la carpeta 'dist' dentro de esa subcarpeta
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/sistema-biblioteca/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'frontrinconcitomagico'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
